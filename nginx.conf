worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Zona de rate limit por IP: 10 requisições por segundo
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/s;
    limit_req_status 429;

    upstream ingestor_backend {
        server ingestor:8080;
    }

    server {
        listen 80;
        server_name _;

        # Health check sem rate limiting
        location = /health {
            proxy_pass http://ingestor_backend/health;
            proxy_set_header Host $host;
        }

        # Rotas da API com rate limiting
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;

            # Remove o prefixo /api antes de passar para o ingestor
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://ingestor_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
            proxy_connect_timeout 5s;
        }

        # Resposta padrão para 429
        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            add_header Retry-After 1;
            return 429 '{"error":"rate_limit_exceeded","message":"Muitas requisições. Tente novamente em 1 segundo."}';
        }
    }
}
