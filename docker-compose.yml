services:

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: solar-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: solar-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ingestor:
    build:
      context: ./src/ingestor-service
      dockerfile: Dockerfile
    container_name: solar-ingestor
    environment:
      - NASA_API_KEY=${NASA_API_KEY:-DEMO_KEY}
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - PORT=8080
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  notifier:
    build:
      context: ./src/notifier-service
      dockerfile: Dockerfile
    container_name: solar-notifier
    environment:
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - ALERT_LOG_FILE=/tmp/alerts.log
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  nginx:
    image: nginx:1.27-alpine
    container_name: solar-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ingestor
    restart: on-failure
